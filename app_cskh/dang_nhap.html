<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CarePoint CSKH — Đăng nhập</title>
<link rel="stylesheet" href="dang_nhap.css"/>
</head>
<body>

<div class="bg-wrap"></div>

<div class="wrapper">

  <div class="brand">
    <div class="bmark">C</div>
    <div class="bname">Care<em>Point</em></div>
  </div>
  <div class="bsub">Hệ thống Chăm sóc Khách hàng</div>

  <div class="card" id="loginCard">
    <div class="card-head">
      <div class="card-title">Đăng nhập</div>
      <div class="card-sub">Dành cho nhân viên CSKH</div>
    </div>

    <div class="alert alert-error" id="alertBox" style="display:none">
      <span id="alertMsg">Thông tin đăng nhập không đúng.</span>
    </div>

    <form onsubmit="handleLogin(event)">
      <div class="field">
        <label class="label" for="username">Tên đăng nhập</label>
        <div class="input-wrap">
          <input class="input" id="username" type="text"
            placeholder="VD: tran.huong" autocomplete="username" required/>
        </div>
      </div>

      <div class="field">
        <label class="label" for="password">Mật khẩu</label>
        <div class="input-wrap">
          <input class="input" id="password" type="password"
            placeholder="Nhập mật khẩu" autocomplete="current-password" required/>
          <button type="button" class="eye-btn" id="eyeBtn" onclick="togglePass()">Hiện</button>
        </div>
      </div>

      <button class="btn-login" type="submit" id="btnLogin">
        <span id="btnText">Đăng nhập</span>
        <span id="btnSpin" class="spinner" style="display:none"></span>
      </button>
    </form>

    <div class="card-footer">
      <span>Phiên bản 1.0</span>
      <span>2025 CarePoint eMarket</span>
    </div>
  </div>

  <div class="dev-hint">
    <b>Demo:</b> tên đăng nhập <code>tran.huong</code> &nbsp;|&nbsp; mật khẩu <code>123456</code>
  </div>

</div>

<script src="supabase_config.js"></script>
<script src="supabase_api.js"></script>
<script src="auth.js"></script>
<script src="dang_nhap.js"></script>
</body>
</html>
