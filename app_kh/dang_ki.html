<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - CarePoint</title>
    <link rel="stylesheet" href="dang_ki.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-container">
                <div class="logo-icon">C</div>
                <div class="logo-text">CarePoint</div>
            </div>
            <h1>Tạo tài khoản</h1>
            <p>Đăng ký thành viên và nhận ưu đãi ngay hôm nay</p>
        </div>

        <div class="tabs">
            <div class="tab">Đăng nhập</div>
            <div class="tab active">Đăng ký</div>
        </div>

        <form id="registerForm" class="form-content">
            <div class="form-group full-width">
                <label>Họ và tên <span class="required">*</span></label>
                <input type="text" id="fullname" placeholder="Nguyễn Văn A">
                <div class="error-message" id="fullname-error"></div>
            </div>

            <div class="form-row">
                <div class="form-group half-width">
                    <label>Số điện thoại <span class="required">*</span></label>
                    <input type="tel" id="phone" placeholder="09xxxxxxxx">
                    <div class="error-message" id="phone-error"></div>
                </div>
                <div class="form-group half-width">
                    <label>Ngày sinh</label>
                    <input type="date" id="dob">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group half-width">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="email@gmail.com">
                </div>
                <div class="form-group half-width">
                    <label>Giới tính</label>
                    <select id="gender">
                        <option value="">Chọn...</option>
                        <option value="male">Nam</option>
                        <option value="female">Nữ</option>
                        <option value="other">Khác</option>
                    </select>
                </div>
            </div>

            <div class="form-group full-width">
                <label>Địa chỉ</label>
                <input type="text" id="address" placeholder="Số nhà, đường, quận, thành phố">
            </div>

            <div class="form-group full-width">
                <label>Mật khẩu <span class="required">*</span></label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Tối thiểu 6 ký tự">
                    <button type="button" class="toggle-password" onclick="togglePassword('password')">Hiện</button>
                </div>
                <div class="error-message" id="password-error"></div>
            </div>

            <div class="form-group full-width">
                <label>Xác nhận mật khẩu <span class="required">*</span></label>
                <div class="password-wrapper">
                    <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu">
                    <button type="button" class="toggle-password" onclick="togglePassword('confirm-password')">Hiện</button>
                </div>
                <div class="error-message" id="confirm-password-error"></div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Tạo tài khoản</button>

            <p class="terms">
                Bằng cách đăng ký, bạn đồng ý với <a href="#">Điều khoản</a> và <a href="#">Chính sách bảo mật</a> của CarePoint.
            </p>
        </form>

        <div class="footer-info">
            <span>Phiên bản 1.0</span>
            <span>2025 CarePoint eMarket</span>
        </div>
        
        <div class="demo-box">
            Demo đăng nhập: SĐT <strong>0912001001</strong> | mật khẩu <strong>123456</strong>
        </div>
    </div>

    <script src="dang_ki.js"></script>
</body>
</html>
