<!-- File: voucher_cua_toi.html / voucher_cua_toi.css / voucher_cua_toi.js — UC-9 -->
<div class="page active" id="page-vouchers">
  <div class="sub-topbar">
    <a class="back-btn" href="app_kh.html">←</a>
    <div class="sub-topbar-title">Voucher của tôi</div>
  </div>

  <div id="mainContent" style="padding:16px 18px;">
    <div class="tabs-row" style="margin-bottom:16px;">
      <div class="tab active" data-voucher-status="chua_dung" onclick="setTab(this)">Khả dụng</div>
      <div class="tab" data-voucher-status="da_dung" onclick="setTab(this)">Đã dùng</div>
      <div class="tab" data-voucher-status="het_han" onclick="setTab(this)">Hết hạn</div>
    </div>

    <!-- TODO: AC - Lọc danh sách theo tab (Khả dụng / Đã dùng / Hết hạn) -->
    <div class="voucher-list" id="voucherList">
      <div class="tx-placeholder">Đang tải voucher...</div>
    </div>

    <div class="bottom-spacer"></div>
  </div>
</div>

<!-- ====== THANH ĐIỀU HƯỚNG DƯỚI CÙNG ====== -->
<div class="bottom-nav">
  <div class="nav-item" id="nav-home" onclick="location.href='app_kh.html'">
    <div class="nav-icon">[ ]</div>
    <div class="nav-label">Trang chủ</div>
  </div>
  <div class="nav-item" id="nav-exchange" onclick="location.href='doi_diem_qua.html'">
    <div class="nav-icon">[ ]</div>
    <div class="nav-label">Đổi điểm</div>
  </div>
  <div class="nav-item active" id="nav-vouchers" onclick="location.href='voucher_cua_toi.html'">
    <div class="nav-icon">[ ]</div>

  </div>

    <div class="nav-icon">[ ]</div>
    <div class="nav-label">Cá nhân</div>
  </div>
</div>

<!-- ====== MODAL: DÙNG VOUCHER ====== -->
<div class="ov" id="modal-use-voucher">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <span class="sheet-close" onclick="closeModal('modal-use-voucher')">x</span>
    <div class="sheet-title">Sử dụng voucher</div>
    <div class="sheet-sub">Xuất trình mã này cho thu ngân</div>
    <div class="qr-box">
      <div class="qr-code" id="useVoucherQR">QR</div>
      <div class="qr-id" id="useVoucherCode">---</div>
      <div class="qr-hint" id="useVoucherHint">---</div>
    </div>
    <div id="useVoucherStatus" style="text-align:center;padding:12px;background:var(--gbg);border-radius:var(--r2);font-size:13px;color:var(--green);font-weight:500;">
      Voucher hợp lệ
    </div>
  </div>
</div>

<div class="toast-wrap" id="toasts"></div>

<script src="supabase_config.js"></script>
